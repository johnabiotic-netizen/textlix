version: '3.8'

services:
  db:
    image: mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: verifynow
    volumes:
      - mongodata:/data/db
    ports:
      - "27017:27017"
    command: ["--replSet", "rs0", "--bind_ip_all"]
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  db-init:
    image: mongo:7
    depends_on:
      db:
        condition: service_healthy
    restart: no
    entrypoint: >
      mongosh --host db:27017 --eval
      "try { rs.status() } catch(e) { rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: 'db:27017' }] }) }"

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    restart: unless-stopped
    env_file: .env
    environment:
      - MONGODB_URI=mongodb://db:27017/verifynow?replicaSet=rs0
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5000:5000"

  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "80:80"

volumes:
  mongodata:
